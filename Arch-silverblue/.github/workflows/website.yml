name: Website

on:
  push:
    branches: [main]
    paths: ['website/**', 'netlify.toml', '.github/workflows/website.yml']
  pull_request:
    paths: ['website/**', 'netlify.toml', '.github/workflows/website.yml']

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: website/.node-version
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      # prebuild runs sync-docs (fails on renamed/moved repo docs); the build
      # runs starlight-links-validator (fails on broken internal links).
      - run: npm run build
