# Installed as /etc/systemd/system.conf.d/silverblue-watchdog.conf
#
# Boot counting alone cannot reboot a system that HANGS (it only abandons a depleted entry
# on the next power cycle). The hardware/software watchdog forces that reboot: if userspace
# wedges, the watchdog fires, the machine resets, and the now-decremented boot counter lands
# on the previous root. (The QEMU integration test does not attach an emulated watchdog —
# systemd cannot cleanly stop QEMU's i6300esb on reboot — so it exercises rollback via boot
# counting instead; this drop-in is inert without a /dev/watchdog device.)
[Manager]
RuntimeWatchdogSec=20s
RebootWatchdogSec=2min
