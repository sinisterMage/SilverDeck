# config/distro.conf — single source of truth for deriving a custom atomic distro.
#
# This is the ONE file you edit to rebrand/derive Arch Silverblue (fork-and-own model:
# your derivative is a full copy of this repo). It is sourced by:
#   * iso/build.sh        (on the build host, to render/rename tools into the ISO)
#   * the autoinstaller   (inside the live ISO, after build.sh copies this file in)
#
# It is plain bash: only KEY="value" assignments and arr=(...) lists — no logic, no command
# substitution. This copy carries the SilverDeck identity (gaming console derivative).
# See DERIVING.md for the full guide.
#
# NOTE on special characters: values that get rendered into files (DISTRO_NAME and the URLs)
# are sed-escaped for &, | and \ by the build, but avoid embedding a literal '|' in DISTRO_NAME
# to be safe.

# --- Identity / branding (drives /etc/os-release + boot-entry titles) ----------------------
DISTRO_ID="silverdeck"                 # lowercase machine id: os-release ID, LOGO, Docker tag
DISTRO_NAME="SilverDeck"               # pretty name: boot-entry titles + os-release NAME/PRETTY_NAME
DISTRO_VERSION="rolling"               # os-release BUILD_ID
DISTRO_VERSION_ID="rolling"            # os-release VERSION_ID
DISTRO_ANSI_COLOR="0;36"               # os-release ANSI_COLOR (terminal accent)
DISTRO_HOME_URL="https://github.com/sinisterMage/SilverDeck"          # os-release HOME_URL + unit Documentation=
DISTRO_DOC_URL="https://github.com/sinisterMage/SilverDeck"           # os-release DOCUMENTATION_URL
DISTRO_SUPPORT_URL="https://github.com/sinisterMage/SilverDeck/issues" # os-release SUPPORT_URL
DISTRO_BUG_URL="https://github.com/sinisterMage/SilverDeck/issues"     # os-release BUG_REPORT_URL

# --- Names & paths (rendered into the IMAGE only; the source tree is never rewritten) -------
BIN_PREFIX="silverdeck"                # CLI is ${BIN_PREFIX}-update  -> /usr/bin/silverdeck-update
UNIT_PREFIX="silverdeck"               # units: ${UNIT_PREFIX}-mark-good.service / -rollback.service / -rollback.target
LIB_DIR="/usr/lib/silverdeck"          # helper/library dir (sdboot/grub helpers, mark-good/rollback scripts)

# --- Cosmetic identifiers (keep BIN_PREFIX/UNIT_PREFIX in mind; usually leave as-is) --------
ESP_SUBDIR="silverdeck"                # per-snapshot kernels on the ESP: /efi/${ESP_SUBDIR}/<snap> (systemd-boot)
SORT_KEY="silverdeck"                  # systemd-boot 'sort-key' grouping value
TOPLEVEL_MNT="/run/silverdeck/toplevel"  # transient Btrfs subvolid=5 mountpoint

# --- System defaults written into the installed target -------------------------------------
HOSTNAME="silverdeck"                  # /etc/hostname
TIMEZONE="UTC"                         # zoneinfo path under /usr/share/zoneinfo (e.g. Europe/Amsterdam)
LOCALE="en_US.UTF-8"                   # locale.gen entry + /etc/locale.conf LANG
KEYMAP=""                              # vconsole KEYMAP ("" = leave default)
INSTALL_LOCK_ROOT="1"                  # unattended installs lock root (kiosk autologs into 'deck')
PLYMOUTH_THEME="silverdeck"            # boot-splash theme baked into the target initramfs ("" = none)

# --- Bootloader / filesystem ---------------------------------------------------------------
BOOTLOADER="systemd-boot"              # default bootloader when none is forced: systemd-boot | grub
FS_LABEL="silverdeck"                  # Btrfs root label + GPT partition name
ESP_LABEL="SD-ESP"                     # FAT32 ESP label
EFI_DIR="/efi"                         # ESP mountpoint on the installed system (advanced; leave at /efi)
KEEP_SNAPSHOTS="3"                     # max snapshots retained by the engine (SB_KEEP)
BOOT_TRIES="3"                         # systemd-boot boot-counting tries (SB_TRIES)

# --- Console-style boot (masked bootloader + splash) ----------------------------------------
# Extra kernel options every install writes into the boot entry (the update engine carries
# them into later snapshots). SilverDeck hides boot noise behind the plymouth splash.
KERNEL_OPTS_EXTRA="quiet splash loglevel=3 rd.udev.log_level=3 systemd.show_status=auto vt.global_cursor_default=0"
SDBOOT_TIMEOUT="0"                     # systemd-boot menu hidden (hold a key at power-on to show it)
GRUB_TIMEOUT="0"                       # GRUB menu hidden; a failed boot (recordfail) still shows it for 10s

# --- Package sets --------------------------------------------------------------------------
# Base system pacstrapped onto the target: the atomic base plus the SilverDeck
# console stack (kiosk session, graphics incl. lib32 for Steam, audio, network,
# flatpak, and the SilverDeck packages from the baked local repo).
PKGS_BASE=(
    # atomic base (upstream)
    base linux mkinitcpio btrfs-progs arch-install-scripts dosfstools gptfdisk efibootmgr
    # hardware
    linux-firmware sof-firmware
    # kiosk session
    greetd sway swaybg xorg-xwayland foot polkit
    # graphics
    mesa vulkan-icd-loader vulkan-radeon vulkan-intel vulkan-nouveau vulkan-swrast
    lib32-mesa lib32-vulkan-icd-loader lib32-vulkan-radeon lib32-vulkan-intel
    # gaming
    steam gamescope
    # audio
    pipewire pipewire-alsa pipewire-pulse wireplumber
    # network / apps
    networkmanager flatpak xdg-desktop-portal xdg-utils
    # fonts
    inter-font ttf-dejavu noto-fonts
    # boot splash
    plymouth
    # SilverDeck (served from the local repo baked into the ISO)
    silverdeck-ui silverdeck-session silverdeck-plymouth
)
# Extra packages added to the live ISO so the installer can run.
PKGS_ISO=(arch-install-scripts btrfs-progs dosfstools gptfdisk mkinitcpio efibootmgr)

# --- Live-ISO GUI installer session ----------------------------------------------------------
# 1 = boot the live ISO straight into the GUI installer kiosk (greetd -> sway ->
# silverdeck-installer); a getty stays on tty2 and the serial console keeps working.
# 0 = stock behavior (console boot, run the text installer by hand).
LIVE_GUI_SESSION="1"
# Packages the live ISO needs for the GUI installer session (on top of PKGS_ISO).
PKGS_ISO_GUI=(
    greetd sway foot polkit
    mesa vulkan-swrast vulkan-icd-loader
    networkmanager
    inter-font ttf-dejavu noto-fonts
    silverdeck-installer
)

# --- Multilib (lib32) ------------------------------------------------------------------------
# 1 = uncomment [multilib] in the live ISO's pacman.conf so pacstrap can install
# lib32 packages (steam). Pair it with a [multilib] entry in EXTRA_REPOS so the
# installed system keeps it for updates.
ENABLE_MULTILIB="1"

# --- Services enabled on the installed target ------------------------------------------------
# systemctl enable'd in the target chroot at the end of the install (both the
# interactive installer and the autoinstaller). Empty = none (stock behavior).
ENABLE_SERVICES=(greetd.service NetworkManager.service silverdeck-firstboot.service)

# --- Extra pacman repos for the installed system -------------------------------------------
# Each element is a complete pacman.conf section block (newlines allowed), appended to the
# target's /etc/pacman.conf. Only applied on the networked install path (so the offline
# hermetic test stays self-contained).
# The [silverdeck] block points at the on-target copy of the local repo (see
# install_local_repo in install-lib.sh) so the update engine can keep resolving
# the SilverDeck packages; swap Server= for an https repo to ship UI updates.
EXTRA_REPOS=(
    $'[multilib]\nInclude = /etc/pacman.d/mirrorlist'
    $'[silverdeck]\nSigLevel = Optional TrustAll\nServer = file:///var/lib/silverdeck/repo'
)
